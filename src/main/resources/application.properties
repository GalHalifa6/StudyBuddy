# Application Configuration
spring.application.name=StudyBuddy
server.port=${SERVER_PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}

# Active profile (set via env: SPRING_PROFILES_ACTIVE=prod)
# Default profile is 'dev' for local development
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database Configuration (H2 for development)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/studybuddy}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA/Hibernate Configuration
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# Flyway Database Migrations
# Dev: disabled (Hibernate ddl-auto manages schema)
# Prod: enabled with baseline-on-migrate for existing databases
spring.flyway.enabled=${FLYWAY_ENABLED:false}

# H2 Console (disabled by default, enabled only in dev profile)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# JWT Configuration (REQUIRED: set JWT_SECRET env var in production, min 32 chars)
jwt.secret=${JWT_SECRET:mySecretKeyForStudyBuddyPlatformThatIsLongEnoughForHS256Algorithm}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}

# Logging (override via env: LOGGING_LEVEL_COM_STUDYBUDDY=DEBUG)
logging.level.com.studybuddy=${LOGGING_LEVEL_COM_STUDYBUDDY:INFO}
logging.level.org.springframework.security=${LOGGING_LEVEL_SPRING_SECURITY:WARN}

# CORS Configuration (comma-separated origins)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Email Configuration (SendGrid via SMTP)
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.sendgrid.net
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.from=${MAIL_FROM_ADDRESS:noreply@studybuddy.com}

# Application URLs
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
app.oauth2.redirect-uri=${FRONTEND_URL:http://localhost:3000}/auth/google/callback

# Jitsi / JaaS configuration
jitsi.jaas.enabled=${JITSI_JAAS_ENABLED:true}
jitsi.jaas.app-id=${JITSI_JAAS_APP_ID:vpaas-magic-cookie-4db39cf5e402480c9929f8358cf57eef}
jitsi.jaas.kid=${JITSI_KID:}
jitsi.jaas.private-key=${JITSI_PRIVATE_KEY:}
jitsi.jaas.meeting-prefix=studybuddy
jitsi.jaas.expiry-seconds=7200
jitsi.jaas.issuer=chat
jitsi.jaas.audience=jitsi