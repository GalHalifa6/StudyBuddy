# Production Profile
# Activated by: SPRING_PROFILES_ACTIVE=prod

# Database: PostgreSQL (configured via env vars)
# With Flyway enabled, ddl-auto should be validate (Flyway manages schema)
spring.jpa.hibernate.ddl-auto=validate

# Flyway enabled in production
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# H2 Console disabled in production
spring.h2.console.enabled=false

# Production logging
logging.level.com.studybuddy=INFO
logging.level.org.springframework.security=WARN
spring.jpa.show-sql=false
