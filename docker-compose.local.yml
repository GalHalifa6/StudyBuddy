version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: studybuddy-db
    environment:
      POSTGRES_DB: studybuddy
      POSTGRES_USER: studybuddy
      POSTGRES_PASSWORD: studybuddy_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studybuddy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - studybuddy-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studybuddy-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/studybuddy
      SPRING_DATASOURCE_USERNAME: studybuddy
      SPRING_DATASOURCE_PASSWORD: studybuddy_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8080
      SERVER_ADDRESS: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-mySecretKeyForStudyBuddyPlatformChangeInProduction}
      JWT_EXPIRATION: 86400000
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@studybuddy.com}
      JITSI_KID: ${JITSI_KID:-}
      JITSI_PRIVATE_KEY: ${JITSI_PRIVATE_KEY:-}
      FRONTEND_URL: http://localhost:3001
      CORS_ALLOWED_ORIGINS: http://localhost:3001
      FILE_UPLOAD_DIR: /app/uploads
      LOGGING_LEVEL_COM_STUDYBUDDY: INFO
    volumes:
      - uploads_data:/app/uploads
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - studybuddy-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-ws://localhost:8080}
    container_name: studybuddy-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - studybuddy-network
    restart: unless-stopped

  mobile:
    build:
      context: ./studybuddy-mobile
      dockerfile: Dockerfile
      target: dev
    container_name: studybuddy-mobile
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      - EXPO_PUBLIC_API_BASE_URL=http://localhost:8080
      - REACT_NATIVE_PACKAGER_HOSTNAME=localhost
    networks:
      - studybuddy-network
    volumes:
      - ./studybuddy-mobile:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  studybuddy-network:
    driver: bridge

